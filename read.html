<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קריאה — ספר השיחות מתורגם ללה״ק</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=David+Libre:wght@400;500;700&family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="analytics.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: #33302a; font-family: 'Assistant', sans-serif; display: flex; flex-direction: column; }
  .bar {
    background: #fbfaf4; color: #1e1b16;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 3px double #1e1b16;
  }
  .bar .title {
    font-family: 'David Libre', serif; font-size: 1rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .bar a {
    color: #fbfaf4; text-decoration: none; font-size: .85rem;
    background: #8e2a1d; border-radius: 0; padding: 6px 14px; white-space: nowrap;
  }
  .bar a.line { background: transparent; border: 1px solid #1e1b16; color: #1e1b16; }
  #frame { flex: 1; width: 100%; border: none; background: #525659; }
  #msg { color: #fff; text-align: center; padding: 60px 20px; font-size: 1.05rem; }
  #msg a { color: #d98a76; }
</style>
</head>
<body>

<div class="bar">
  <span class="title" id="title">טוען…</span>
  <a id="dl" download>הורדה ⬇</a>
  <a class="line" href="index.html">לאתר</a>
</div>

<div id="msg" style="display:none"></div>
<iframe id="frame" title="קריאת השיחה"></iframe>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var file = params.get('file') || '';
  var title = params.get('title') || 'קריאת השיחה';
  document.getElementById('title').textContent = title;
  document.title = title + ' — ספר השיחות מתורגם ללה״ק';
  var dl = document.getElementById('dl');
  dl.href = file;

  var frame = document.getElementById('frame');
  var msg = document.getElementById('msg');

  // הגנה: מציגים רק קבצים מתוך האתר עצמו
  if (!file || file.indexOf('//') !== -1 || file.indexOf('..') !== -1 || !/\.pdf$/i.test(file)) {
    frame.style.display = 'none';
    msg.style.display = 'block';
    msg.textContent = 'לא נמצא קובץ להצגה.';
    return;
  }

  // זיהוי אמין: שואלים את הדפדפן אם הוא יודע להציג PDF בעצמו.
  // אם אין תשובה ברורה — בודקים לפי סוג המכשיר.
  var canInline;
  if (typeof navigator.pdfViewerEnabled === 'boolean') {
    canInline = navigator.pdfViewerEnabled;
  } else {
    canInline = !/android|iphone|ipad|ipod|mobile/i.test(navigator.userAgent);
  }
  // מעקב קריאה: זוכרים שהשיחה נקראה, ומהי האחרונה שנפתחה (נשמר רק בדפדפן של הגולש)
  try {
    var readSet = JSON.parse(localStorage.getItem('sichos-read') || '{}');
    readSet[file] = Date.now();
    localStorage.setItem('sichos-read', JSON.stringify(readSet));
    localStorage.setItem('sichos-last', JSON.stringify({ file: file, title: title, at: Date.now() }));
  } catch (e) {}

  var fullUrl = location.origin + '/' + file;

  if (!canInline) {
    // בטלפון: תצוגה דרך שירות של גוגל (הדפדפן בטלפון לא מציג PDF בעצמו)
    frame.src = 'https://docs.google.com/viewer?embedded=true&url=' + encodeURIComponent(fullUrl);
    // אם התצוגה לא נטענה תוך 8 שניות — ניסיון רענון אוטומטי (קורה לפעמים בשירות של גוגל)
    var loaded = false;
    frame.addEventListener('load', function () { loaded = true; });
    setTimeout(function () {
      if (!loaded) frame.src = frame.src;
    }, 8000);
    setTimeout(function () {
      if (!loaded) {
        msg.style.display = 'block';
        msg.innerHTML = 'התצוגה מתעכבת… אפשר <a href="' + file + '">לפתוח את הקובץ ישירות</a>.';
      }
    }, 16000);
  } else {
    // במחשב: הדפדפן מציג PDF מצוין בעצמו
    frame.src = file + '#toolbar=1';
  }
})();
</script>
</body>
</html>
