<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קריאה — ספר השיחות מתורגם ללה״ק</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Heebo:wght@400;500&display=swap" rel="stylesheet">
<script src="analytics.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #3a4356; font-family: 'Heebo', sans-serif; min-height: 100vh; }
  .bar {
    position: sticky; top: 0; z-index: 10;
    background: #1a2942; color: #fff;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 2px solid #b8933e;
  }
  .bar .title {
    font-family: 'Frank Ruhl Libre', serif; font-size: 1rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .bar a {
    color: #fff; text-decoration: none; font-size: .85rem;
    background: #b8933e; border-radius: 8px; padding: 6px 14px; white-space: nowrap;
  }
  .bar a.line { background: transparent; border: 1px solid rgba(255,255,255,.55); }
  #pages { max-width: 900px; margin: 14px auto; padding: 0 8px; }
  #pages canvas {
    display: block; width: 100%; height: auto;
    margin-bottom: 10px; border-radius: 6px;
    box-shadow: 0 4px 18px rgba(0,0,0,.35); background: #fff;
  }
  #msg { color: #fff; text-align: center; padding: 60px 20px; font-size: 1.05rem; }
</style>
</head>
<body>

<div class="bar">
  <span class="title" id="title">טוען…</span>
  <a id="dl" download>הורדה ⬇</a>
  <a class="line" href="index.html">לאתר</a>
</div>

<div id="msg">טוען את הקובץ…</div>
<div id="pages"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var file = params.get('file') || '';
  var title = params.get('title') || 'קריאת השיחה';
  document.getElementById('title').textContent = title;
  document.title = title + ' — ספר השיחות מתורגם ללה״ק';
  var dl = document.getElementById('dl');
  dl.href = file;

  // הגנה: מציגים רק קבצים מתוך האתר עצמו
  if (!file || file.indexOf('//') !== -1 || file.indexOf('..') !== -1 || !/\.pdf$/i.test(file)) {
    document.getElementById('msg').textContent = 'לא נמצא קובץ להצגה.';
    return;
  }

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  var container = document.getElementById('pages');
  var msg = document.getElementById('msg');

  pdfjsLib.getDocument(file).promise.then(function (pdf) {
    msg.style.display = 'none';
    var scale = Math.min((window.devicePixelRatio || 1) * 1.5, 3);
    var chain = Promise.resolve();
    for (var n = 1; n <= pdf.numPages; n++) {
      (function (pageNum) {
        chain = chain.then(function () {
          return pdf.getPage(pageNum).then(function (page) {
            var viewport = page.getViewport({ scale: scale });
            var canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            container.appendChild(canvas);
            return page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
          });
        });
      })(n);
    }
  }).catch(function (e) {
    msg.textContent = 'שגיאה בטעינת הקובץ. אפשר לנסות להוריד אותו: ';
    var a = document.createElement('a');
    a.href = file; a.download = ''; a.textContent = 'הורדה';
    a.style.color = '#d4b56a';
    msg.appendChild(a);
  });
})();
</script>
</body>
</html>
