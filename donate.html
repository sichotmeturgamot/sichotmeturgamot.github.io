<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תרומה — ספר השיחות מתורגם ללה״ק</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="brand">ספר השיחות מתורגם ללה״ק</a>
  <div class="links">
    <a href="index.html">ראשי</a>
    <a href="sichos.html">קריאת השיחות</a>
    <a href="subscribe.html">הצטרפות לעדכונים</a>
    <a href="donate.html" class="active">תרומה</a>
  </div>
</nav>

<main>
  <div class="card center" style="max-width:560px;margin:30px auto">
    <div style="font-size:1.6rem;margin-bottom:8px;color:var(--gold)">✦ ✦ ✦</div>
    <h2 id="site-donate-title">תרומה להדפסת השיחות</h2>
    <p class="muted" style="margin-bottom:20px" id="site-donate-text">ניתן ליטול חלק בזכות הפצת המעיינות ולסייע בהדפסת שיחות חדשות היוצאות לאור. התרומות מוקדשות להדפסה ולהפצת הקבצים.</p>
    <p style="margin:6px 0">תרומה בביט: <b class="ltr" id="bit-phone" style="color:var(--navy)"></b></p>
    <p style="margin:6px 0">ליצירת קשר ולפרטים: <a id="donate-mail" style="color:var(--gold)"></a></p>
  </div>
</main>


<script>document.write('<script src="data.js?v=' + Date.now() + '"><\/script>');</script>
<script>
  // החלת טקסטים ועיצוב מההגדרות
  if (typeof SITE !== 'undefined' && SITE) {
    const rt = document.documentElement.style;
    if (SITE.colorNavy) rt.setProperty('--navy', SITE.colorNavy);
    if (SITE.colorGold) rt.setProperty('--gold', SITE.colorGold);
    if (SITE.colorCream) rt.setProperty('--cream', SITE.colorCream);
    if (SITE.brand) document.querySelectorAll('.brand').forEach(e => e.textContent = SITE.brand);
    const setTxt = (id, v) => { const el = document.getElementById(id); if (el && v) el.textContent = v; };
    setTxt('site-hero-title', SITE.heroTitle);
    setTxt('site-hero-sub', SITE.heroSub);
    setTxt('site-about1', SITE.about1);
    setTxt('site-about2-text', SITE.about2);
    setTxt('site-subscribe-text', SITE.subscribeText);
    setTxt('site-donate-title', SITE.donateTitle);
    setTxt('site-donate-text', SITE.donateText);
    if (SITE.customCss) { const st = document.createElement('style'); st.textContent = SITE.customCss; document.head.appendChild(st); }
  }
  document.getElementById('bit-phone').textContent = DONATE_BIT_PHONE;
  const m = document.getElementById('donate-mail');
  m.textContent = DONATE_EMAIL;
  m.href = 'mailto:' + DONATE_EMAIL + '?subject=' + encodeURIComponent('תרומה להדפסת השיחות');
</script>
<script>
  // גלילה חיה: פס התקדמות + חשיפה הדרגתית
  (function () {
    const bar = document.createElement('div'); bar.id = 'scroll-progress'; document.body.appendChild(bar);
    addEventListener('scroll', () => {
      const h = document.documentElement;
      bar.style.width = (h.scrollTop / ((h.scrollHeight - h.clientHeight) || 1) * 100) + '%';
    }, { passive: true });
    if (!('IntersectionObserver' in window)) return;
    const io = new IntersectionObserver(es => es.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
    }), { threshold: .12 });
    const hook = () => document.querySelectorAll('main .card:not(.reveal), .sicha:not(.reveal)').forEach((el, i) => {
      el.classList.add('reveal');
      el.style.transitionDelay = (Math.min(i, 6) * 70) + 'ms';
      io.observe(el);
    });
    hook();
    new MutationObserver(hook).observe(document.body, { childList: true, subtree: true });
  })();
</script>
<script>
  // החלקה בטלפון בין עמודי האתר
  (function () {
    const pages = ['index.html', 'sichos.html', 'subscribe.html', 'donate.html'];
    const cur = location.pathname.split('/').pop() || 'index.html';
    if (!pages.includes(cur)) return;
    // טעינה מוקדמת של שאר העמודים — מעבר מהיר
    pages.filter(p => p !== cur).forEach(p => {
      const l = document.createElement('link'); l.rel = 'prefetch'; l.href = p; document.head.appendChild(l);
    });
    let x0 = null, y0 = null, t0 = 0;
    addEventListener('touchstart', e => {
      const v = document.getElementById('viewer-wrap');
      if (v && v.classList.contains('open')) { x0 = null; return; }
      x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; t0 = Date.now();
    }, { passive: true });
    addEventListener('touchend', e => {
      if (x0 === null) return;
      const dx = e.changedTouches[0].clientX - x0;
      const dy = e.changedTouches[0].clientY - y0;
      const dt = Date.now() - t0;
      x0 = null;
      if (dt > 600 || Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
      const i = pages.indexOf(cur);
      // החלקה ימינה = העמוד הבא (שמאלה בתפריט); החלקה שמאלה = חזרה
      const next = dx > 0 ? i + 1 : i - 1;
      if (next >= 0 && next < pages.length) {
        document.body.style.transition = 'transform .12s ease, opacity .12s';
        document.body.style.transform = 'translateX(' + (dx > 0 ? '40px' : '-40px') + ')';
        document.body.style.opacity = '0.4';
        location.href = pages[next];
      }
    }, { passive: true });
  })();
</script>
</body>
</html>
