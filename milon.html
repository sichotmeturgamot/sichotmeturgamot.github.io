    position: absolute; inset-inline-end: 12px; top: 50%; transform: translateY(-50%);

  .count-line { max-width: 640px; margin: 12px auto 0; color: var(--muted); font-size: .86rem; text-align: center; min-height: 1.2em; }

  .results { max-width: 640px; margin: 14px auto 0; }

    background: var(--paper); border: 1px solid var(--line);

  .entry mark { background: #f4ecd7; color: var(--gold-dark); border-radius: 3px; padding: 0 1px; }

  .empty-state { max-width: 640px; margin: 26px auto 0; text-align: center; color: var(--muted); }
  .empty-state .big { font-family: 'Frank Ruhl Libre', serif; font-size: 1.15rem; color: var(--navy); margin-bottom: 6px; }
  .empty-state p { font-size: .92rem; }

  .more-hint { text-align: center; color: var(--muted); font-size: .82rem; margin: 6px auto 0; max-width: 640px; }

<script>
  // החלת צבעים ומותג מההגדרות (כמו בשאר העמודים)
  if (typeof SITE !== 'undefined' && SITE) {
    const rt = document.documentElement.style;
    const darkMode = matchMedia('(prefers-color-scheme: dark)').matches;
    if (!darkMode && SITE.colorNavy) rt.setProperty('--navy', SITE.colorNavy);
    if (!darkMode && SITE.colorGold) rt.setProperty('--gold', SITE.colorGold);
    if (!darkMode && SITE.colorCream) rt.setProperty('--cream', SITE.colorCream);
    if (SITE.brand) document.querySelectorAll('.brand').forEach(e => e.textContent = SITE.brand);
    if (SITE.customCss) { const st = document.createElement('style'); st.textContent = SITE.customCss; document.head.appendChild(st); }
  }
</script>
<script>
  // ===== לוגיקת המילון =====
  (function () {
    const MAX_SHOW = 80;
    const qEl = document.getElementById('q');
    const clearEl = document.getElementById('clear');
    const resEl = document.getElementById('results');
    const countEl = document.getElementById('count');
    const emptyEl = document.getElementById('empty');
    const moreEl = document.getElementById('more');

    let DATA = [];          // {key, yid, heb}
    let loaded = false;

    // נירמול זהה ל-make_milon2.py — כדי שהקלט יתאים למפתחות שבקובץ
    function stripNikud(s) {
      let out = '';
      for (const c of s) { const o = c.codePointAt(0); if (!(o >= 0x5B0 && o <= 0x5C7)) out += c; }
      return out;
    }
    function normalize(s) {
      s = stripNikud(s);
      s = s.replace(/ײ/g, 'יי').replace(/ױ/g, 'וי').replace(/װ/g, 'וו');
      for (const ch of ['׳', '״', "'", '"', '­', '-', '־', ' ']) s = s.split(ch).join('');
      s = s.replace(/עה/g, 'ע');
      if (s.endsWith('ען')) s = s.slice(0, -2) + 'ן';
      if (s.endsWith('יג')) s = s.slice(0, -1) + 'ק';
      return s;
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function render() {
      const raw = qEl.value.trim();
      clearEl.style.display = raw ? 'block' : 'none';
      if (!raw) {
        resEl.innerHTML = ''; countEl.textContent = ''; moreEl.textContent = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';
      if (!loaded) { countEl.textContent = 'טוען מילון…'; return; }

      const q = normalize(raw);
      if (!q) { resEl.innerHTML = ''; countEl.textContent = ''; return; }

      const starts = [], contains = [];
      for (const e of DATA) {
        const p = e.key.indexOf(q);
        if (p === 0) starts.push(e);
        else if (p > 0) contains.push(e);
      }
      starts.sort((a, b) => a.key.length - b.key.length || a.key.localeCompare(b.key));
      contains.sort((a, b) => a.key.localeCompare(b.key));
      const all = starts.concat(contains);
      const total = all.length;
      const show = all.slice(0, MAX_SHOW);

      if (total === 0) {
        resEl.innerHTML = '';
        countEl.innerHTML = 'לא נמצאה מילה מתאימה. נסו כתיב אחר, או בלי ניקוד.';
        moreEl.textContent = '';
        return;
      }
      countEl.textContent = total === 1 ? 'נמצאה מילה אחת' : ('נמצאו ' + total + ' מילים');
      resEl.innerHTML = show.map(e =>
        '<div class="entry"><span class="yid">' + escapeHtml(e.yid) +
        '</span><span class="heb">' + escapeHtml(e.heb) + '</span></div>'
      ).join('');
      moreEl.textContent = total > MAX_SHOW ? ('מוצגות ' + MAX_SHOW + ' הראשונות — הקלידו עוד אותיות לצמצום') : '';
    }

    // טעינת קובץ המילון
    fetch('milon2.txt?v=' + Date.now())
      .then(r => r.text())
      .then(txt => {
        const lines = txt.split('\n');
        for (const line of lines) {
          if (!line) continue;
          const i1 = line.indexOf('|');
          if (i1 < 0) continue;
          const i2 = line.indexOf('|', i1 + 1);
          if (i2 < 0) continue;
          DATA.push({ key: line.slice(0, i1), yid: line.slice(i1 + 1, i2), heb: line.slice(i2 + 1) });
        }
        loaded = true;
        render();
      })
      .catch(() => { countEl.textContent = 'שגיאה בטעינת המילון. נסו לרענן את העמוד.'; });

    let t = null;
    qEl.addEventListener('input', () => { clearTimeout(t); t = setTimeout(render, 90); });
    clearEl.addEventListener('click', () => { qEl.value = ''; qEl.focus(); render(); });
    // מיקוד אוטומטי במחשב (לא בטלפון כדי לא לפתוח מקלדת מיד)
    if (!matchMedia('(max-width: 640px)').matches) qEl.focus();
  })();
</script>
<script>

    const bar = document.createElement('div'); bar.id = 'scroll-progress'; document.body.appendChild(bar);
    addEventListener('scroll', () => {
      const h = document.documentElement;
      bar.style.width = (h.scrollTop / ((h.scrollHeight - h.clientHeight) || 1) * 100) + '%';
    }, { passive: true });
  })();
  document.body.classList.add('page-in');
</script>
